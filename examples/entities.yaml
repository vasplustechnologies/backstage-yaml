---
# Frontend Services
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-portal
  description: Customer facing web portal for TechCorp services
  title: Customer Portal
  tags:
    - react
    - website
    - frontend
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: techcorp/customer-portal
    backstage.io/managed-by-location: url:https://github.com/techcorp/customer-portal
spec:
  type: website
  lifecycle: production
  owner: group:team-alpha
  system: customer-facing
  dependsOn:
    - component:mobile-api-gateway
    - component:user-service
    - resource:redis-cache
  providesApis:
    - customer-portal-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: admin-dashboard
  description: Internal admin dashboard for TechCorp employees
  title: Admin Dashboard
  tags:
    - vue
    - website
    - internal
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: techcorp/admin-dashboard
spec:
  type: website
  lifecycle: production
  owner: group:team-alpha
  system: internal-tools
  dependsOn:
    - component:mobile-api-gateway
    - component:user-service
    - component:inventory-service
---
# Backend Services
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mobile-api-gateway
  description: API Gateway for all mobile and web clients
  title: Mobile API Gateway
  tags:
    - graphql
    - gateway
    - nodejs
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: techcorp/api-gateway
spec:
  type: service
  lifecycle: production
  owner: group:team-platform
  system: platform
  dependsOn:
    - component:user-service
    - component:payment-service
    - component:inventory-service
    - component:notification-service
    - resource:redis-cache
  providesApis:
    - gateway-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: user-service
