# Define resources (databases, external services, etc.)
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: user-database
  description: PostgreSQL database for user profiles and authentication data
  title: User Database
  tags:
    - postgresql
    - aws-rds
spec:
  type: database
  owner: group:team-bravo
  system: user-management
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: payment-database
  description: PostgreSQL database for payment transactions
  title: Payment Database
  tags:
    - postgresql
    - aws-rds
spec:
  type: database
  owner: group:team-charlie
  system: payment
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: inventory-database
  description: MongoDB database for product inventory
  title: Inventory Database
  tags:
    - mongodb
    - atlas
spec:
  type: database
  owner: group:team-delta
  system: inventory
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: redis-cache
  description: Redis cluster for caching and session management
  title: Redis Cache Cluster
  tags:
    - redis
    - elasticache
spec:
  type: cache
  owner: group:team-platform
  system: platform
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: payment-processor
  description: External payment gateway integration (Stripe)
  title: Stripe Payment Gateway
  tags:
    - stripe
    - third-party
spec:
  type: third-party-service
  owner: group:team-charlie
  system: payment
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: email-gateway
  description: AWS SES for email delivery
  title: Email Gateway
  tags:
    - aws-ses
    - email
spec:
  type: third-party-service
  owner: group:team-platform
  system: platform
---
# Define systems (logical grouping of components)
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: customer-facing
  description: Customer facing applications and services
  title: Customer Experience
spec:
  owner: group:team-alpha
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: user-management
  description: User identity and management system
  title: User Management
spec:
  owner: group:team-bravo
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: payment
  description: Payment processing system
  title: Payment System
spec:
  owner: group:team-charlie
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: inventory
  description: Inventory management system
  title: Inventory System
spec:
  owner: group:team-delta
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: platform
  description: Shared platform infrastructure
  title: Platform Infrastructure
spec:
  owner: group:team-platform