# Define APIs
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: user-api
  description: User management REST API
  title: User Service API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: group:team-bravo
  system: user-management
  definition: |
    openapi: 3.0.1
    info:
      title: User API
      version: 1.0.0
    paths:
      /users:
        get:
          summary: Get all users
          responses:
            '200':
              description: List of users
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        email:
                          type: string
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-api
  description: Payment processing REST API
  title: Payment Service API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: group:team-charlie
  system: payment
  definition: |
    openapi: 3.0.1
    info:
      title: Payment API
      version: 1.0.0
    paths:
      /payments:
        post:
          summary: Process a payment
          responses:
            '200':
              description: Payment processed successfully
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                      amount:
                        type: number
      /payments/{id}:
        get:
          summary: Get payment details
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Payment details
              content:
                application/json:
                  schema:
                    type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                    amount:
                      type: number
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: inventory-api
  description: Inventory management REST API
  title: Inventory Service API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: group:team-delta
  system: inventory
  definition: |
    openapi: 3.0.1
    info:
      title: Inventory API
      version: 1.0.0
    paths:
      /inventory:
        get:
          summary: Get all inventory items
          responses:
            '200':
              description: List of inventory items
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        quantity:
                          type: integer
        post:
          summary: Add inventory item
          responses:
            '201':
              description: Item created
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: notification-api
  description: Notification service REST API
  title: Notification Service API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: group:team-platform
  system: platform
  definition: |
    openapi: 3.0.1
    info:
      title: Notification API
      version: 1.0.0
    paths:
      /notifications:
        post:
          summary: Send a notification
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [email, push, sms]
                    recipient:
                      type: string
                    message:
                      type: string
          responses:
            '200':
              description: Notification sent
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: gateway-api
  description: GraphQL API Gateway endpoint
  title: API Gateway GraphQL
  tags:
    - graphql
    - federation
spec:
  type: graphql
  lifecycle: production
  owner: group:team-platform
  system: platform
  definition: |
    type Query {
      users: [User]
      payments: [Payment]
      inventory: [InventoryItem]
      notifications: [Notification]
    }
    
    type Mutation {
      createUser(name: String!, email: String!): User
      processPayment(amount: Float!): Payment
      sendNotification(type: String!, recipient: String!, message: String!): Notification
    }
    
    type User {
      id: ID!
      name: String!
      email: String!
    }
    
    type Payment {
      id: ID!
      amount: Float!
      status: String!
      createdAt: String!
    }
    
    type InventoryItem {
      id: ID!
      name: String!
      quantity: Int!
    }
    
    type Notification {
      id: ID!
      type: String!
      recipient: String!
      message: String!
      status: String!
    }
---
